name: Discover New Tools
on:
  schedule:
    - cron: '0 7 * * 3'
  workflow_dispatch:
jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Discover and add new tools
        id: discover
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/discover-tools.mjs | tee /tmp/discover-output.log
          TOOL_SLUGS=$(grep -oP '(?<=Adding tool: )\S+' /tmp/discover-output.log | sed 's/^/https:\/\/apprival.net\/tools\//' | tr '\n' ' ')
          COMP_SLUGS=$(grep -oP '(?<=→ )\S+(?= ✓)' /tmp/discover-output.log | sed 's/^/https:\/\/apprival.net\/compare\//' | tr '\n' ' ')
          echo "urls=$TOOL_SLUGS $COMP_SLUGS" >> "$GITHUB_OUTPUT"
      - name: Commit new tools and comparisons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/tools.ts src/data/comparisons.ts public/sitemap.xml
          git diff --staged --quiet || git commit -m "feat: auto-discover new tools $(date +'%Y-%m-%d')"
          git push
      - name: Ping IndexNow
        if: success()
        run: |
          node scripts/indexnow.mjs \
            "https://apprival.net/tools" \
            "https://apprival.net/compare" \
            ${{ steps.discover.outputs.urls }}
