name: Update Comparisons
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run update script
        id: update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/update-comparisons.mjs | tee /tmp/update-output.log
          COMP_SLUGS=$(grep -oP '(?<=Updating \[\d+/\d+\]: )\S+(?=\.\.\. ✓)' /tmp/update-output.log | sed 's/^/https:\/\/apprival.net\/compare\//' | tr '\n' ' ')
          echo "urls=$COMP_SLUGS" >> "$GITHUB_OUTPUT"
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/comparisons.ts
          git diff --staged --quiet || git commit -m "chore: auto-update comparisons $(date +'%Y-%m-%d')"
          git push
      - name: Ping IndexNow
        if: success()
        run: |
          node scripts/indexnow.mjs \
            "https://apprival.net/compare" \
            ${{ steps.update.outputs.urls }}
